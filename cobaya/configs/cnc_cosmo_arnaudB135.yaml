# CNC cosmology chain on the FLAMINGO arnaudB135 counts (B=1.35 selection).
# Identical setup/priors to cnc_cosmo_arnaudB1.yaml; only the observed data file
# and the (fixed) bias B differ.  B=1.35 (bias_sz=1/1.35) matches the data: the
# cosmocnc planck_sim SR applies y0 ~ (M/B)^alpha and theta_500 ~ (M/B)^(1/3),
# exactly the construction of the B=1.35 N(z,q) counts.
# SAMPLED: omega_cdm U(0.0804,0.204) [Omega_m derived; avoids the prior-volume
#          effect of sampling Omega_m directly], sigma8, alpha(=alpha_szifi), A_SZ.
output: /scratch/scratch-lxu/flamingo_repo/chains/cnc_cosmo_arnaudB135/cnc_cosmo

likelihood:
  cnc_likelihood.CNCBinnedFlamingoLikelihood:
    input_params: [sigma8, omega_cdm, omega_b, h, H0, n_s, tau_reio, m_nu, A_SZ, alpha_SZ, sigma_lnY, B]
    data_file: "/scratch/scratch-lxu/flamingo_repo/data/cnc/N2d_z_q_bin_arnaudB135.txt"
    z_min: 0.005
    z_max: 1.0
    n_z_bins: 10
    q_min: 5.0
    q_max: 40.0
    n_q_bins: 5
    n_points: 2048
    n_z: 50
    M_min: 5.0e13
    M_max: 1.0e16
    f_sky: 1.0
    M_pivot: 2.1e14

params:
  # ----- cosmology: sampled (omega_cdm directly, to avoid the prior-volume
  #        effect of sampling Omega_m with a derived omega_cdm) -----
  omega_cdm:
    prior: {min: 0.0804, max: 0.204}
    ref:   {dist: norm, loc: 0.1187, scale: 0.01}
    proposal: 0.01
    latex: \omega_c
  Omega_m:
    derived: "lambda omega_cdm, h, omega_b: (omega_cdm + omega_b + 0.000644) / h**2"
    latex: \Omega_m
  sigma8:
    prior: {min: 0.7, max: 0.9}
    ref:   {dist: norm, loc: 0.811, scale: 0.02}
    proposal: 0.02
    latex: \sigma_8
  # ----- cosmology: fixed (D3A) -----
  h:
    prior: {dist: norm, loc: 0.681, scale: 0.024}
    ref:   {dist: norm, loc: 0.681, scale: 0.024}
    proposal: 0.015
    latex: h
  omega_b:
    prior: {dist: norm, loc: 0.022539, scale: 0.002}
    ref:   {dist: norm, loc: 0.022539, scale: 0.002}
    proposal: 0.001
    latex: '\omega_b'
  m_nu:     {value: 0.06}
  n_s:
    prior: {dist: norm, loc: 0.967, scale: 0.014}
    ref:   {dist: norm, loc: 0.967, scale: 0.014}
    proposal: 0.008
    latex: n_s
  tau_reio: {value: 0.0544}
  H0:       {value: "lambda h: 100.0 * h", latex: H_0}
  # ----- scaling relation: sample alpha and A_SZ; fix bias B=1.35 -----
  alpha_SZ:
    prior: {min: 0.9, max: 1.24}
    ref:   {dist: norm, loc: 1.07, scale: 0.05}
    proposal: 0.05
    latex: \alpha
  A_SZ:
    prior: {min: -4.41, max: -4.21}
    ref:   {dist: norm, loc: -4.31, scale: 0.03}
    proposal: 0.02
    latex: 'A_{SZ}'
  sigma_lnY:
    prior: {dist: norm, loc: 0.173, scale: 0.023}
    ref:   {dist: norm, loc: 0.173, scale: 0.023}
    proposal: 0.015
    latex: '\sigma_{\ln Y}'
  B:         {value: 1.35,    latex: B}

sampler:
  mcmc:
    Rminus1_stop: 0.05
    drag: false
    proposal_scale: 1.5
    learn_every: 40
    learn_proposal: true
    burn_in: 100
    max_tries: 100000

timing: true
logging_level: info
