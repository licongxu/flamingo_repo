# CNC cosmology on FLAMINGO arnaudB135 counts (B=1.35 selection).
# Cosmology priors aligned with case03_cnc_only: sample Omega_m and ln(10^10 A_s),
# derive omega_cdm.  Amplitude via A_s (not sigma8).  B=1.35 fixed.
output: /scratch/scratch-lxu/flamingo_repo/chains/cnc_cosmo_arnaudB135_Om_lnAs/cnc_cosmo

likelihood:
  cnc_likelihood.CNCBinnedFlamingoLikelihood:
    cosmo_amplitude_parameter: A_s
    input_params: [ln10_10A_s, Omega_m, omega_cdm, omega_b, h, H0, n_s, tau_reio, m_nu, A_SZ, alpha_SZ, sigma_lnY, B]
    data_file: "/scratch/scratch-lxu/flamingo_repo/data/cnc/N2d_z_q_bin_arnaudB135.txt"
    z_min: 0.005
    z_max: 1.0
    n_z_bins: 10
    q_min: 5.0
    q_max: 40.0
    n_q_bins: 5
    n_points: 2048
    n_z: 50
    M_min: 5.0e13
    M_max: 1.0e16
    f_sky: 1.0
    M_pivot: 2.1e14

params:
  ln10_10A_s:
    prior: {min: 2.5, max: 3.5}
    ref:   {dist: norm, loc: 2.9718, scale: 0.13}
    proposal: 0.13
    latex: \ln(10^{10}A_s)
  Omega_m:
    prior: {min: 0.2, max: 0.5}
    ref:   {dist: norm, loc: 0.3096, scale: 0.02}
    proposal: 0.02
    latex: \Omega_m
  omega_cdm:
    value: "lambda Omega_m, H0, omega_b: Omega_m * (H0 / 100.0)**2 - omega_b"
    latex: \Omega_\mathrm{c} h^2
  h:
    prior: {dist: norm, loc: 0.681, scale: 0.024}
    ref:   {dist: norm, loc: 0.681, scale: 0.024}
    proposal: 0.015
    latex: h
  omega_b:
    prior: {dist: norm, loc: 0.022539, scale: 0.002}
    ref:   {dist: norm, loc: 0.022539, scale: 0.002}
    proposal: 0.001
    latex: '\omega_b'
  m_nu:     {value: 0.06}
  n_s:
    prior: {dist: norm, loc: 0.967, scale: 0.014}
    ref:   {dist: norm, loc: 0.967, scale: 0.014}
    proposal: 0.008
    latex: n_s
  tau_reio: {value: 0.0544}
  H0:       {value: "lambda h: 100.0 * h", latex: H_0}
  alpha_SZ:
    prior: {min: 0.9, max: 1.24}
    ref:   {dist: norm, loc: 1.07, scale: 0.05}
    proposal: 0.05
    latex: \alpha
  A_SZ:
    prior: {min: -4.41, max: -4.21}
    ref:   {dist: norm, loc: -4.31, scale: 0.03}
    proposal: 0.02
    latex: 'A_{SZ}'
  sigma_lnY:
    prior: {dist: norm, loc: 0.173, scale: 0.023}
    ref:   {dist: norm, loc: 0.173, scale: 0.023}
    proposal: 0.015
    latex: '\sigma_{\ln Y}'
  B:         {value: 1.35,    latex: B}

sampler:
  mcmc:
    Rminus1_stop: 0.05
    drag: false
    proposal_scale: 1.5
    learn_every: 40
    learn_proposal: true
    burn_in: 100
    max_tries: 100000

timing: true
logging_level: info
