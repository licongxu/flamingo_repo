# Combined CNC + masked tSZ PS (ell>100), B=1 selection, SOAP Y_R500c (q>5).
#
# CNC data: N2d_z_q_bin_arnaudB1_Y500c.txt (GNFW K at r_out=1).
# PS data:  Dl_yy_qgt5_binned_18_Y500c.txt, last 9 bins (ell>100).
# PS cov:   theory_cov_arnaudB1/cov_full_qgt5 (18x18, sliced by likelihood).
#
# Theory: HMFastTSZIterCProfile (ParametricGNFW).  Fixed A_SZ from hmfast A10
# GNFWPressureProfile (B=1) at D3A: median log10 match to parametric y0 with
# alpha=1.12 (scripts/compute_arnaudB1_full_cov._a10_gnfw_y0_sr) -> -4.28739604.
# Sample omega_cdm, sigma8, alpha_SZ, B, sigma_lnY; Gaussian priors on h, omega_b, n_s.
# CNC and PS share the same sampled cosmology; PS q-selection SNR grid is rebuilt
# each evaluation so shape params stay prior-driven (not fixed at D3A in theory).
output: /scratch/scratch-lxu/flamingo_repo/chains/cnc_yy_combined_arnaudB1_Y500c/combined

likelihood:
  cnc_likelihood.CNCBinnedFlamingoLikelihood:
    input_params: [sigma8, omega_cdm, omega_b, h, H0, n_s, tau_reio, m_nu, A_SZ, alpha_SZ, sigma_lnY, B]
    data_file: /scratch/scratch-lxu/flamingo_repo/data/cnc/N2d_z_q_bin_arnaudB1_Y500c.txt
    z_min: 0.005
    z_max: 1.0
    n_z_bins: 10
    q_min: 5.0
    q_max: 40.0
    n_q_bins: 5
    n_points: 2048
    n_z: 50
    M_min: 50000000000000.0
    M_max: 1.0e+16
    f_sky: 1.0
    M_pivot: 210000000000000.0
  yy_ellcut_likelihood.YYEllCutGaussianLikelihood:
    data_directory: /scratch/scratch-lxu/flamingo_repo/data/bandpowers_arnaudB1_Y500c
    data_file: Dl_yy_qgt5_binned_18_Y500c.txt
    cov_file: /scratch/scratch-lxu/flamingo_repo/data/theory_cov_arnaudB1/cov_full_qgt5_Dl_yy_binned_18.npy
    keep_last: 9
    log_every: 50

theory:
  hmfast_tsz_iter_cprofile.HMFastTSZIterCProfile:
    q_cat: 5.0
    include_2h: true
    a_sz_sr: -4.28739604
    alpha_sr: 1.12
    b_sr: 1.0

params:
  omega_cdm:
    prior:
      min: 0.0804
      max: 0.204
    ref:
      dist: norm
      loc: 0.1187
      scale: 0.01
    proposal: 0.01
    latex: \omega_c
  Omega_m:
    derived: 'lambda omega_cdm, h, omega_b: (omega_cdm + omega_b + 0.000644) / h**2'
    latex: \Omega_m
  sigma8:
    prior:
      min: 0.7
      max: 0.9
    ref:
      dist: norm
      loc: 0.811
      scale: 0.02
    proposal: 0.02
    latex: \sigma_8
  h:
    prior:
      dist: norm
      loc: 0.681
      scale: 0.024
    ref:
      dist: norm
      loc: 0.681
      scale: 0.024
    proposal: 0.015
    latex: h
  omega_b:
    prior:
      dist: norm
      loc: 0.022539
      scale: 0.002
    ref:
      dist: norm
      loc: 0.022539
      scale: 0.002
    proposal: 0.001
    latex: \omega_b
  m_nu:
    value: 0.06
  n_s:
    prior:
      dist: norm
      loc: 0.967
      scale: 0.014
    ref:
      dist: norm
      loc: 0.967
      scale: 0.014
    proposal: 0.008
    latex: n_s
  tau_reio:
    value: 0.0544
  H0:
    value: 'lambda h: 100.0 * h'
    latex: H_0
  alpha_SZ:
    prior:
      dist: norm
      loc: 1.0
      scale: 0.1
    ref:
      dist: norm
      loc: 1.0
      scale: 0.1
    proposal: 0.05
    latex: \alpha
  A_SZ:
    value: -4.28739604
    latex: A_{SZ}
  sigma_lnY:
    prior:
      dist: norm
      loc: 0.173
      scale: 0.023
    ref:
      dist: norm
      loc: 0.173
      scale: 0.023
    proposal: 0.015
    latex: \sigma_{\ln Y}
  B:
    prior:
      dist: norm
      loc: 1.1
      scale: 0.05
    ref:
      dist: norm
      loc: 1.1
      scale: 0.05
    proposal: 0.05
    latex: B
  c_500:
    value: 1.156
    latex: c_{500}
  beta_SZ:
    value: 0.0
    latex: \beta_{SZ}

sampler:
  mcmc:
    Rminus1_stop: 0.05
    drag: false
    proposal_scale: 1.5
    learn_every: 40
    learn_proposal: true
    burn_in: 100
    max_tries: 100000

timing: true
logging_level: info
