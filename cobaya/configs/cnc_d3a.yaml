# CNC nuisance-only inference, cosmology FIXED at D3A.
# Sampled: A_SZ, alpha_SZ, sigma_lnY.  Fixed: cosmology + B=1.25.
output: /scratch/scratch-lxu/flamingo_repo/chains/cnc_d3a/cnc_d3a

likelihood:
  cnc_likelihood.CNCBinnedFlamingoLikelihood:
    input_params: [sigma8, omega_cdm, omega_b, h, H0, n_s, tau_reio, m_nu, A_SZ, alpha_SZ, sigma_lnY, B]
    data_file: "/scratch/scratch-lxu/flamingo_repo/data/cnc/N2d_z_q_bin.txt"
    z_min: 0.005
    z_max: 1.0
    n_z_bins: 10
    q_min: 5.0
    q_max: 40.0
    n_q_bins: 5
    n_points: 2048
    n_z: 50
    M_min: 5.0e13
    M_max: 1.0e16
    f_sky: 1.0
    M_pivot: 2.1e14

params:
  # --- cosmology FIXED at D3A ---
  sigma8:    {value: 0.807,     latex: \sigma_8}
  omega_cdm: {value: 0.118729,  latex: \omega_c}
  omega_b:   {value: 0.022539,  latex: \omega_b}
  h:         {value: 0.681,     latex: h}
  H0:        {value: "lambda h: 100.0 * h", latex: H_0}
  n_s:       {value: 0.967,     latex: n_s}
  tau_reio:  {value: 0.0544}
  m_nu:      {value: 0.06}
  B:         {value: 1.25,      latex: B}

  # --- nuisance: sampled ---
  A_SZ:
    prior: {min: -5.5, max: -3.0}
    ref:   {dist: norm, loc: -4.31, scale: 0.1}
    proposal: 0.1
    latex: A_{SZ}
  alpha_SZ:
    value: 1.12
    latex: \alpha_{SZ}
  sigma_lnY:
    prior: {dist: norm, loc: 0.173, scale: 0.023}
    ref:   {dist: norm, loc: 0.173, scale: 0.023}
    proposal: 0.01
    latex: \sigma_{\ln Y}

sampler:
  mcmc:
    Rminus1_stop: 0.05
    drag: false
    proposal_scale: 1.5
    learn_every: 40
    learn_proposal: true
    burn_in: 50
    max_tries: 100000

timing: true
logging_level: info
