# CNC-only: B=1.35 selection mock, unrotated z<0.35 volume.
# B ~ U(1,2), alpha_SZ ~ U(0.9,1.2), omega_b fixed D3A; cosmology sampled.
output: /scratch/scratch-lxu/flamingo_repo/chains/cnc_cosmo_arnaudB135_Y500c_unrot_z0p35_uniformB/cnc_cosmo

likelihood:
  cnc_likelihood.CNCBinnedFlamingoLikelihood:
    input_params:
    - sigma8
    - omega_cdm
    - omega_b
    - h
    - H0
    - n_s
    - tau_reio
    - m_nu
    - A_SZ
    - alpha_SZ
    - sigma_lnY
    - B
    data_file: /scratch/scratch-lxu/flamingo_repo/data/cnc/N2d_z_q_bin_arnaudB135_Y500c_unrot_z0p35.txt
    z_min: 0.005
    z_max: 0.35
    n_z_bins: 7
    q_min: 5.0
    q_max: 40.0
    n_q_bins: 5
    n_points: 2048
    n_z: 50
    M_min: 50000000000000.0
    M_max: 1.0e+16
    f_sky: 1.0
    M_pivot: 210000000000000.0
params:
  omega_cdm:
    prior:
      min: 0.0804
      max: 0.204
    ref:
      dist: norm
      loc: 0.1187
      scale: 0.01
    proposal: 0.01
    latex: \omega_c
  Omega_m:
    derived: 'lambda omega_cdm, h, omega_b: (omega_cdm + omega_b + 0.000644) / h**2'
    latex: \Omega_m
  sigma8:
    prior:
      min: 0.7
      max: 0.9
    ref:
      dist: norm
      loc: 0.811
      scale: 0.02
    proposal: 0.02
    latex: \sigma_8
  h:
    prior:
      dist: norm
      loc: 0.681
      scale: 0.024
    ref:
      dist: norm
      loc: 0.681
      scale: 0.024
    proposal: 0.015
    latex: h
  omega_b:
    value: 0.022539
    latex: \omega_b
  m_nu:
    value: 0.06
  n_s:
    prior:
      dist: norm
      loc: 0.967
      scale: 0.014
    ref:
      dist: norm
      loc: 0.967
      scale: 0.014
    proposal: 0.008
    latex: n_s
  tau_reio:
    value: 0.0544
  H0:
    value: 'lambda h: 100.0 * h'
    latex: H_0
  alpha_SZ:
    prior:
      min: 0.9
      max: 1.2
    ref:
      dist: norm
      loc: 1.05
      scale: 0.05
    proposal: 0.03
    latex: \alpha
  A_SZ:
    value: -4.28739604
    latex: A_{SZ}
  sigma_lnY:
    prior:
      dist: norm
      loc: 0.173
      scale: 0.023
    ref:
      dist: norm
      loc: 0.173
      scale: 0.023
    proposal: 0.015
    latex: \sigma_{\ln Y}
  B:
    prior:
      min: 1.0
      max: 2.0
    ref:
      dist: norm
      loc: 1.35
      scale: 0.05
    proposal: 0.05
    latex: B
sampler:
  mcmc:
    Rminus1_stop: 0.05
    drag: false
    proposal_scale: 1.5
    learn_every: 40
    learn_proposal: true
    burn_in: 100
    max_tries: 100000
    covmat: /scratch/scratch-lxu/flamingo_repo/chains/cnc_cosmo_arnaudB1_Y500c_uniformB/cnc_cosmo.covmat
    covmat_params:
      - omega_cdm
      - sigma8
      - h
      - n_s
      - alpha_SZ
      - sigma_lnY
      - B
    fallback_covmat_scale: 1.5
timing: true
logging_level: info
