output: /scratch/scratch-lxu/flamingo_repo/chains/mcmc_arnaudB1_fitB_ellgt100/yy_qgt5_fitB

likelihood:
  yy_ellcut_likelihood.YYEllCutGaussianLikelihood:
    data_directory: "/scratch/scratch-lxu/flamingo_repo/data/bandpowers_arnaudB1"
    data_file: "Dl_yy_qgt5_binned_18.txt"
    cov_file: "/scratch/scratch-lxu/flamingo_repo/data/theory_cov_arnaudB1/cov_full_qgt5_Dl_yy_binned_18.npy"
    keep_last: 9
    log_every: 50

theory:
  # A10 GNFW (hmfast defaults) masked tSZ; cosmology fixed D3A (logA -> A_s=2.099e-9).
  # Completeness from A10 GNFW y0 (A_SZ matched, alpha_SZ=1.12, B_SR=1.0), matching
  # scripts/compute_arnaudB1_full_cov.py. sigma_lnY fixed; sample B (signal).
  hmfast_tsz_iter_gnfw.HMFastTSZIterGNFWLogA:
    n_mass: 64
    n_z: 96
    log10_m_min: 10.0
    log10_m_max: 15.5
    z_min: 0.005
    z_max: 3.0
    n_ell_internal: 50
    q_cat: 5.0
    include_2h: true
    a_sz_sr: -4.287396
    alpha_sr: 1.12
    b_sr: 1.0

params:
  logA:      {value: 3.044046, latex: '\ln(10^{10} A_s)'}
  omega_cdm: {value: 0.118729, latex: '\omega_c'}
  omega_b:   {value: 0.022539, latex: '\omega_b'}
  H0:        {value: 68.1,     latex: H_0}
  n_s:       {value: 0.967,    latex: n_s}
  tau_reio:  {value: 0.0544}
  P0:    {value: 8.13,   latex: P_0}
  c500:  {value: 1.156,  latex: 'c_{500}'}
  alpha: {value: 1.062,  latex: '\alpha'}
  beta:  {value: 5.4807, latex: '\beta'}
  gamma: {value: 0.3292, latex: '\gamma'}
  sigma_lnY: {value: 0.173, latex: '\sigma_{\ln Y}'}
  B:
    prior: {min: 1.0, max: 2.0}
    ref: {dist: norm, loc: 1.1, scale: 0.05}
    proposal: 0.05
    latex: B

sampler:
  mcmc:
    Rminus1_stop: 0.05
    drag: false
    learn_every: 40
    learn_proposal: true
    burn_in: 50
    max_tries: 50000

timing: true
logging_level: info
