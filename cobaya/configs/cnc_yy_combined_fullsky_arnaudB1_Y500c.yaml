# Combined CNC + full-sky tSZ PS, B=1 selection, SOAP Y_R500c (q>5 counts).
#
# CNC data: N2d_z_q_bin_arnaudB1_Y500c.txt (GNFW K at r_out=1).
# PS data:  Dl_yy_fullsky_binned_18_Y500c.txt (yang26-rot, no cluster masking).
# PS cov:   theory_cov_arnaudB1/cov_full_fullsky (18x18, last 9 bins ell>100).
#
# Theory: HMFastTSZIterCProfile (ParametricGNFW), q_cat=1e9 (full-sky completeness).
# Priors: identical to configs/cnc_cosmo_arnaudB1_Y500c_cccp.yaml
#   (CCCP 1-b ~ N(0.780,0.092), B=1/(1-b); omega_b fixed D3A; Gaussian h/n_s).
output: /scratch/scratch-lxu/flamingo_repo/chains/cnc_yy_combined_fullsky_arnaudB1_Y500c/combined

likelihood:
  cnc_likelihood.CNCBinnedFlamingoLikelihood:
    input_params: [sigma8, omega_cdm, omega_b, h, H0, n_s, tau_reio, m_nu, A_SZ, alpha_SZ, sigma_lnY, one_minus_b, B]
    data_file: /scratch/scratch-lxu/flamingo_repo/data/cnc/N2d_z_q_bin_arnaudB1_Y500c.txt
    z_min: 0.005
    z_max: 1.0
    n_z_bins: 10
    q_min: 5.0
    q_max: 40.0
    n_q_bins: 5
    n_points: 2048
    n_z: 50
    M_min: 50000000000000.0
    M_max: 1.0e+16
    f_sky: 1.0
    M_pivot: 210000000000000.0
  yy_ellcut_likelihood.YYEllCutGaussianLikelihood:
    data_directory: /scratch/scratch-lxu/flamingo_repo/data/bandpowers_arnaudB1_Y500c
    data_file: Dl_yy_fullsky_binned_18_Y500c.txt
    cov_file: /scratch/scratch-lxu/flamingo_repo/data/theory_cov_arnaudB1/cov_full_fullsky_Dl_yy_binned_18.npy
    keep_last: 9
    log_every: 50

theory:
  hmfast_tsz_iter_cprofile.HMFastTSZIterCProfile:
    q_cat: 1.0e9
    include_2h: true
    a_sz_sr: -4.28739604
    alpha_sr: 1.12
    b_sr: 1.0

params:
  omega_cdm:
    prior:
      min: 0.0804
      max: 0.204
    ref:
      dist: norm
      loc: 0.1187
      scale: 0.01
    proposal: 0.01
    latex: \omega_c
  Omega_m:
    derived: 'lambda omega_cdm, h, omega_b: (omega_cdm + omega_b + 0.000644) / h**2'
    latex: \Omega_m
  sigma8:
    prior:
      min: 0.7
      max: 0.9
    ref:
      dist: norm
      loc: 0.811
      scale: 0.02
    proposal: 0.02
    latex: \sigma_8
  h:
    prior:
      dist: norm
      loc: 0.681
      scale: 0.024
    ref:
      dist: norm
      loc: 0.681
      scale: 0.024
    proposal: 0.015
    latex: h
  omega_b:
    value: 0.022539
    latex: \omega_b
  m_nu:
    value: 0.06
  n_s:
    prior:
      dist: norm
      loc: 0.967
      scale: 0.014
    ref:
      dist: norm
      loc: 0.967
      scale: 0.014
    proposal: 0.008
    latex: n_s
  tau_reio:
    value: 0.0544
  H0:
    value: 'lambda h: 100.0 * h'
    latex: H_0
  alpha_SZ:
    prior:
      dist: norm
      loc: 1.0
      scale: 0.1
    ref:
      dist: norm
      loc: 1.0
      scale: 0.1
    proposal: 0.05
    latex: \alpha
  A_SZ:
    value: -4.28739604
    latex: A_{SZ}
  sigma_lnY:
    prior:
      dist: norm
      loc: 0.173
      scale: 0.023
    ref:
      dist: norm
      loc: 0.173
      scale: 0.023
    proposal: 0.015
    latex: \sigma_{\ln Y}
  one_minus_b:
    prior:
      dist: norm
      loc: 0.780
      scale: 0.092
    ref:
      dist: norm
      loc: 0.780
      scale: 0.092
    proposal: 0.02
    latex: 1-b
  B:
    value: 'lambda one_minus_b: 1.0 / one_minus_b'
    latex: B
  c_500:
    value: 1.156
    latex: c_{500}
  beta_SZ:
    value: 0.0
    latex: \beta_{SZ}

sampler:
  mcmc:
    Rminus1_stop: 0.05
    Rminus1_cl_stop: 0.2
    drag: false
    proposal_scale: 1.2
    learn_every: 20
    learn_proposal: true
    burn_in: 100
    max_tries: 100000
    covmat: /scratch/scratch-lxu/flamingo_repo/chains/cnc_cosmo_arnaudB1_Y500c/cnc_cosmo.covmat
    covmat_params:
      - omega_cdm
      - sigma8
      - h
      - n_s
      - alpha_SZ
      - sigma_lnY
    fallback_covmat_scale: 1.5

timing: true
logging_level: info
